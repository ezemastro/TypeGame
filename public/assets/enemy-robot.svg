<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img">
  <title>Enemy Robot</title>
  <desc>Top-down 3/4 view of a red enemy robot with animated claws, sway, and glowing eyes.</desc>

  <defs>
    <style>
      .body-sway {
        animation: sway 2s ease-in-out infinite alternate;
        transform-origin: 24px 24px;
      }
      .claw-left {
        animation: clawL 0.6s ease-in-out infinite alternate;
        transform-origin: 14px 36px;
      }
      .claw-right {
        animation: clawR 0.6s ease-in-out infinite alternate;
        transform-origin: 34px 36px;
      }
      .eye-glow {
        animation: glow 1.5s ease-in-out infinite;
      }

      @keyframes sway {
        0%   { transform: rotate(-3deg); }
        100% { transform: rotate(3deg); }
      }
      @keyframes clawL {
        0%   { transform: rotate(10deg); }
        100% { transform: rotate(-10deg); }
      }
      @keyframes clawR {
        0%   { transform: rotate(-10deg); }
        100% { transform: rotate(10deg); }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.6; }
        50%      { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .body-sway,
        .claw-left,
        .claw-right,
        .eye-glow {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <!-- Legs (behind body) -->
  <g class="body-sway">
    <rect x="10" y="37" width="8" height="10" rx="2" fill="#D32F2F" />
    <rect x="30" y="37" width="8" height="10" rx="2" fill="#D32F2F" />
  </g>

  <!-- Claws (behind body edges) -->
  <polygon class="claw-left"  points="6,36 2,48 14,42" fill="#D32F2F" />
  <polygon class="claw-right" points="42,36 46,48 34,42" fill="#D32F2F" />

  <!-- Main body group -->
  <g class="body-sway">
    <!-- Body -->
    <rect x="6" y="6" width="36" height="36" rx="6" fill="#FF5252" />

    <!-- Eyes -->
    <circle class="eye-glow" cx="14" cy="18" r="4" fill="#FF8A80" />
    <circle cx="14" cy="18" r="1.5" fill="#FFFFFF" />

    <circle class="eye-glow" cx="34" cy="18" r="4" fill="#FF8A80" />
    <circle cx="34" cy="18" r="1.5" fill="#FFFFFF" />

    <!-- Mouth - zigzag with 4 teeth -->
    <polyline points="16,32 20,28 24,32 28,28 32,32"
              fill="none" stroke="#FFFFFF" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
