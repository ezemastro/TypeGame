<svg xmlns="http://www.w3.org/2000/svg" width="80" height="110" viewBox="0 0 80 110" role="img">
  <title>AstroType — Ringed Planet</title>
  <desc>Purple Saturn-like planet floating in space with ring. Geometric construction using circles and ellipses only. Parallax background.</desc>

  <!-- Ring (behind planet) -->
  <ellipse cx="40" cy="45" rx="38" ry="10" fill="none" stroke="#B388FF" stroke-width="4" />
  <ellipse cx="40" cy="45" rx="38" ry="10" fill="none" stroke="#D1C4E9" stroke-width="1.5" opacity="0.5" />

  <!-- Planet body -->
  <circle cx="40" cy="45" r="25" fill="#7C4DFF" />

  <!-- Dark crescent (shadow on right side) -->
  <circle cx="50" cy="42" r="22" fill="#5E35B1" opacity="0.4" />

  <!-- Core highlight (light source top-left) -->
  <circle cx="32" cy="35" r="7" fill="#B388FF" opacity="0.35" />

  <!-- Small moon -->
  <circle cx="18" cy="60" r="4" fill="#BDBDBD" />
  <circle cx="17" cy="59" r="1.5" fill="#EEEEEE" opacity="0.6" />
</svg>
