<svg xmlns="http://www.w3.org/2000/svg" width="80" height="40" viewBox="0 0 80 40" role="img">
  <title>AstroType — Cooling Fins</title>
  <desc>Silver cooling fins for Quick Cooling power-up. Overlays on weapon barrel body. Static.</desc>

  <!-- Three cooling fin ridges on top of barrel -->
  <rect x="30" y="8" width="2.5" height="5" rx="1" fill="#B0BEC5" />
  <rect x="36" y="8" width="2.5" height="5" rx="1" fill="#CFD8DC" />
  <rect x="42" y="8" width="2.5" height="5" rx="1" fill="#B0BEC5" />
  <rect x="48" y="8" width="2.5" height="5" rx="1" fill="#CFD8DC" />

  <!-- Base plate connecting fins -->
  <rect x="30" y="11" width="21" height="2" rx="0.5" fill="#90A4AE" opacity="0.5" />
</svg>
