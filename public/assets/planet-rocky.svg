<svg xmlns="http://www.w3.org/2000/svg" width="80" height="110" viewBox="0 0 80 110" role="img">
  <title>AstroType — Rocky Planet</title>
  <desc>Orange-brown rocky planet with craters. No rings. Floating in space.</desc>

  <!-- Planet body -->
  <circle cx="40" cy="45" r="25" fill="#FF7043" />

  <!-- Dark crescent (right shadow) -->
  <circle cx="50" cy="42" r="22" fill="#BF360C" opacity="0.4" />

  <!-- Large craters -->
  <circle cx="28" cy="32" r="5" fill="#BF360C" opacity="0.35" />
  <circle cx="45" cy="52" r="4" fill="#BF360C" opacity="0.3" />
  <circle cx="32" cy="58" r="3.5" fill="#BF360C" opacity="0.3" />

  <!-- Smaller craters -->
  <circle cx="22" cy="48" r="2.5" fill="#BF360C" opacity="0.25" />
  <circle cx="48" cy="38" r="2" fill="#BF360C" opacity="0.25" />

  <!-- Surface highlight -->
  <circle cx="30" cy="34" r="7" fill="#FFAB91" opacity="0.3" />
</svg>
