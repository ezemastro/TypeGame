<svg xmlns="http://www.w3.org/2000/svg" width="80" height="110" viewBox="0 0 80 110" role="img">
  <title>AstroType — Desert Planet</title>
  <desc>Golden desert planet with subtle dune marks. No rings. Floating in space.</desc>

  <!-- Planet body -->
  <circle cx="40" cy="45" r="25" fill="#FFC107" />

  <!-- Dark crescent (right shadow) -->
  <circle cx="50" cy="42" r="22" fill="#F57F17" opacity="0.4" />

  <!-- Dune/terrain marks -->
  <ellipse cx="32" cy="38" rx="10" ry="3.5" fill="#FF8F00" opacity="0.25" />
  <ellipse cx="44" cy="52" rx="8" ry="3" fill="#FF8F00" opacity="0.2" />
  <ellipse cx="28" cy="56" rx="7" ry="2.5" fill="#FF8F00" opacity="0.2" />

  <!-- Surface highlight -->
  <circle cx="30" cy="34" r="8" fill="#FFE082" opacity="0.35" />

  <!-- Small darker spots -->
  <circle cx="48" cy="40" r="3" fill="#F57F17" opacity="0.2" />
  <circle cx="24" cy="50" r="2.5" fill="#F57F17" opacity="0.2" />
</svg>
