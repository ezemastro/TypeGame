<svg xmlns="http://www.w3.org/2000/svg" width="120" height="60" viewBox="0 0 120 60" role="img">
  <title>AstroType — Space Nebula</title>
  <desc>Soft diffuse space nebula built from large overlapping ellipses with very low opacity. Parallax background element.</desc>

  <!-- Wide lavender base -->
  <ellipse cx="60" cy="30" rx="55" ry="24" fill="#B388FF" opacity="0.10" />

  <!-- Pink-purple core -->
  <ellipse cx="45" cy="28" rx="35" ry="20" fill="#E040FB" opacity="0.12" />

  <!-- Cyan-blue accent edge -->
  <ellipse cx="85" cy="35" rx="30" ry="18" fill="#448AFF" opacity="0.08" />

  <!-- Bright center highlight -->
  <ellipse cx="50" cy="25" rx="20" ry="12" fill="#E040FB" opacity="0.15" />

  <!-- Subtle star-like bright spots within the nebula -->
  <circle cx="42" cy="22" r="2" fill="#FFFFFF" opacity="0.25" />
  <circle cx="55" cy="30" r="1.5" fill="#FFFFFF" opacity="0.20" />
  <circle cx="48" cy="35" r="1" fill="#FFFFFF" opacity="0.15" />
</svg>
