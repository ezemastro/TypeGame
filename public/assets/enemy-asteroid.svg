<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" role="img">
  <title>AstroType — Enemy Asteroid</title>
  <desc>Hostile asteroid with glowing red eyes. Gray rocky body with craters. Static for Phaser.CANVAS.</desc>

  <!-- Rocky body -->
  <circle cx="24" cy="24" r="18" fill="#757575" />

  <!-- Craters -->
  <circle cx="16" cy="18" r="3.5" fill="#616161" opacity="0.5" />
  <circle cx="30" cy="20" r="3" fill="#616161" opacity="0.45" />
  <circle cx="22" cy="32" r="4" fill="#616161" opacity="0.5" />

  <!-- Surface highlights -->
  <circle cx="18" cy="14" r="6" fill="#9E9E9E" opacity="0.35" />
  <circle cx="32" cy="28" r="5" fill="#9E9E9E" opacity="0.3" />

  <!-- Left eye (red, hostile glow) -->
  <circle cx="17" cy="26" r="4" fill="#FF5252" />
  <circle cx="17" cy="26" r="1.5" fill="#FFFFFF" />

  <!-- Right eye -->
  <circle cx="31" cy="26" r="4" fill="#FF5252" />
  <circle cx="31" cy="26" r="1.5" fill="#FFFFFF" />
</svg>
