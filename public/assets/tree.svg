<svg width="80" height="100" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>TypeBot — Tree (Parallax Background)</title>
  <desc>Stylized tree with layered green canopy and brown trunk. Subtle breeze sway animation for parallax depth.</desc>

  <style>
    @media (prefers-reduced-motion: reduce) {
      .tree {
        animation: none !important;
      }
    }

    /*
     * Subtle lateral oscillation (±2px) to simulate a light breeze.
     */
    .tree {
      animation: breeze 3s ease-in-out infinite alternate;
    }

    @keyframes breeze {
      from { transform: translateX(-2px); }
      to   { transform: translateX(2px); }
    }
  </style>

  <g class="tree">
    <!-- Ground shadow -->
    <ellipse cx="40" cy="88" rx="20" ry="6" fill="#000000" opacity="0.15" />

    <!-- Trunk -->
    <rect x="33" y="45" width="14" height="45" rx="2" fill="#795548" />

    <!-- Canopy layers (back to front) -->
    <!-- Bottom layer — largest, darkest -->
    <circle cx="40" cy="40" r="28" fill="#66BB6A" />

    <!-- Mid-left layer -->
    <circle cx="28" cy="32" r="24" fill="#81C784" />

    <!-- Mid-right layer -->
    <circle cx="52" cy="35" r="22" fill="#4CAF50" />

    <!-- Top layer -->
    <circle cx="40" cy="22" r="18" fill="#81C784" />
  </g>
</svg>
