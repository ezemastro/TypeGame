<svg width="80" height="110" viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>TypeBot — Pine Tree (Parallax Background)</title>
  <desc>Clean geometric pine tree with layered triangular canopy and subtle ground shadow.</desc>

  <!-- Ground shadow -->
  <ellipse cx="40" cy="106" rx="18" ry="4" fill="#1C280A" opacity="0.3" />

  <!-- Trunk -->
  <rect x="34" y="56" width="12" height="50" rx="2" fill="#5D4037" />

  <!-- Lower canopy — darker green base triangle -->
  <polygon points="40,10 8,68 72,68" fill="#388E3C" />

  <!-- Upper canopy — lighter green highlight -->
  <polygon points="40,4 16,52 64,52" fill="#4CAF50" opacity="0.8" />

  <!-- Right-side depth shadow -->
  <polygon points="40,10 56,68 72,68" fill="#2E7D32" opacity="0.35" />
</svg>
