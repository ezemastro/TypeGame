<svg xmlns="http://www.w3.org/2000/svg" width="80" height="110" viewBox="0 0 80 110" role="img">
  <title>AstroType — Ringed Planet</title>
  <desc>Purple Saturn-like planet with ring. Geometric construction using circles and ellipses only. Parallax background.</desc>

  <!-- Ground shadow -->
  <ellipse cx="40" cy="106" rx="22" ry="4" fill="#000000" opacity="0.15" />

  <!-- Planet body -->
  <circle cx="40" cy="45" r="25" fill="#7C4DFF" />

  <!-- Dark crescent (right side shadow) -->
  <circle cx="50" cy="42" r="22" fill="#5E35B1" opacity="0.4" />

  <!-- Ring (behind planet top, in front of planet bottom) — split into two halves for proper layering -->
  <!-- Ring back half (behind planet) -->
  <ellipse cx="40" cy="48" rx="38" ry="10" fill="none" stroke="#B388FF" stroke-width="4" />
  <ellipse cx="40" cy="48" rx="38" ry="10" fill="none" stroke="#D1C4E9" stroke-width="1.5" opacity="0.5" />

  <!-- Front ring cover (obscures ring in front of planet) — using planet-colored ellipse clip effect -->
  <ellipse cx="40" cy="42" rx="26" ry="26" fill="none" />

  <!-- Core highlight (light source top-left) -->
  <circle cx="32" cy="34" r="6" fill="#B388FF" opacity="0.35" />
</svg>
