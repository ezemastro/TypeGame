<svg xmlns="http://www.w3.org/2000/svg" width="80" height="40" viewBox="0 0 80 40" role="img">
  <title>AstroType — Scope Lens</title>
  <desc>Purple targeting scope for Sharp Sight power-up. Overlays above weapon muzzle. Static.</desc>

  <!-- Lens body -->
  <circle cx="60" cy="5" r="5" fill="#B388FF" opacity="0.5" />

  <!-- Lens ring -->
  <circle cx="60" cy="5" r="5" fill="none" stroke="#7C4DFF" stroke-width="1.5" />

  <!-- Crosshair inside lens -->
  <rect x="58" y="4" width="4" height="2" rx="0.5" fill="#FFFFFF" opacity="0.7" />
  <rect x="59" y="3" width="2" height="4" rx="0.5" fill="#FFFFFF" opacity="0.7" />

  <!-- Mount bracket -->
  <rect x="57" y="10" width="6" height="3" rx="1" fill="#7C4DFF" opacity="0.4" />
</svg>
