<svg width="64" height="80" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>TypeBot — Player Robot (back view)</title>

  <!-- Antenna -->
  <line x1="32" y1="10" x2="32" y2="3" stroke="#00E676" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="2" r="2.5" fill="#00E676"/>

  <!-- Head (back view — no face) -->
  <circle cx="32" cy="22" r="12" fill="#00E676"/>
  <circle cx="32" cy="22" r="8" fill="none" stroke="#00C853" stroke-width="1" opacity="0.4"/>
  <!-- Back head vents -->
  <rect x="27" y="18" width="2" height="5" rx="1" fill="#00B248" opacity="0.3"/>
  <rect x="31" y="18" width="2" height="5" rx="1" fill="#00B248" opacity="0.3"/>
  <rect x="35" y="18" width="2" height="5" rx="1" fill="#00B248" opacity="0.3"/>

  <!-- Shoulder pads -->
  <rect x="7" y="29" width="11" height="6" rx="2" fill="#00B248"/>
  <rect x="46" y="29" width="11" height="6" rx="2" fill="#00B248"/>

  <!-- Body -->
  <rect x="11" y="33" width="42" height="23" rx="5" fill="#00E676"/>
  <!-- Back panel -->
  <rect x="17" y="37" width="30" height="13" rx="3" fill="none" stroke="#00C853" stroke-width="1.5" opacity="0.5"/>
  <line x1="19" y1="40" x2="45" y2="40" stroke="#00C853" stroke-width="1" opacity="0.3"/>
  <line x1="19" y1="46" x2="45" y2="46" stroke="#00C853" stroke-width="1" opacity="0.3"/>
  <!-- Power core -->
  <circle cx="32" cy="43" r="4" fill="#00C853"/>
  <circle cx="32" cy="43" r="1.5" fill="#00B248"/>

  <!-- Left arm -->
  <rect x="2" y="34" width="8" height="18" rx="3" fill="#00C853"/>
  <circle cx="6" cy="53" r="3" fill="#00E676"/>

  <!-- Right arm with weapon -->
  <rect x="54" y="34" width="8" height="18" rx="3" fill="#00C853"/>
  <!-- Weapon barrel (gray, pointing upward) -->
  <rect x="56" y="34" width="3" height="14" rx="1" fill="#78909C"/>
  <circle cx="57.5" cy="32" r="2.5" fill="#00E676"/>
  <!-- Right hand -->
  <circle cx="58" cy="52" r="3" fill="#00E676"/>

  <!-- Legs (walking pose — staggered) -->
  <rect x="16" y="56" width="10" height="14" rx="3" fill="#00C853"/>
  <rect x="15" y="68" width="12" height="5" rx="2" fill="#00B248"/>

  <rect x="38" y="54" width="10" height="14" rx="3" fill="#00C853"/>
  <rect x="37" y="66" width="12" height="5" rx="2" fill="#00B248"/>
</svg>
