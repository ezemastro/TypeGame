<svg width="64" height="80" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Typestrike — Player Robot</title>
  <desc>Circle World style player robot, back view, walking away from screen.</desc>

  <!-- Ground shadow -->
  <ellipse cx="32" cy="74" rx="16" ry="3" fill="#000000" opacity="0.15" />

  <!-- Legs (behind body, walking pose — offset Y) -->
  <rect x="38" y="48" width="10" height="16" rx="3" fill="#00C853" />
  <rect x="16" y="50" width="10" height="16" rx="3" fill="#00C853" />

  <!-- Feet -->
  <rect x="37" y="61" width="12" height="5" rx="2" fill="#00B248" />
  <rect x="15" y="63" width="12" height="5" rx="2" fill="#00B248" />

  <!-- Shoulder pads (slightly behind body edges) -->
  <rect x="46" y="28" width="12" height="6" rx="2" fill="#00B248" />
  <rect x="6" y="28" width="12" height="6" rx="2" fill="#00B248" />

  <!-- Right arm (robot's right → viewer's left) + weapon -->
  <rect x="7" y="30" width="7" height="18" rx="3" fill="#00C853" />
  <g transform="rotate(-20 10.5 28)">
    <rect x="9" y="16" width="3" height="12" rx="1" fill="#78909C" />
    <circle cx="10.5" cy="15" r="2.5" fill="#00E676" />
  </g>

  <!-- Left arm (robot's left → viewer's right) + hand -->
  <rect x="50" y="30" width="7" height="18" rx="3" fill="#00C853" />
  <circle cx="53.5" cy="48" r="3.5" fill="#00E676" />

  <!-- Body -->
  <rect x="18" y="28" width="28" height="22" rx="6" fill="#00E676" />

  <!-- Panel lines (2 horizontal strokes) -->
  <line x1="20" y1="34" x2="44" y2="34" stroke="#00C853" stroke-width="2" stroke-linecap="round" />
  <line x1="20" y1="42" x2="44" y2="42" stroke="#00C853" stroke-width="2" stroke-linecap="round" />

  <!-- Core (cyan back circle + white highlight) -->
  <circle cx="32" cy="38" r="4" fill="#00E5FF" />
  <circle cx="32" cy="38" r="1.5" fill="#FFFFFF" />

  <!-- Head (back view — NO face) -->
  <circle cx="32" cy="18" r="11" fill="#00E676" />
  <circle cx="32" cy="18" r="7" fill="none" stroke="#00C853" stroke-width="1.5" />

  <!-- Head vents (3 small pill shapes) -->
  <rect x="28" y="14" width="2" height="5" rx="1" fill="#00B248" opacity="0.4" />
  <rect x="31" y="14" width="2" height="5" rx="1" fill="#00B248" opacity="0.4" />
  <rect x="34" y="14" width="2" height="5" rx="1" fill="#00B248" opacity="0.4" />

  <!-- Antenna -->
  <line x1="32" y1="7" x2="32" y2="2" stroke="#00E676" stroke-width="2" stroke-linecap="round" />
  <circle cx="32" cy="2" r="2.5" fill="#00E676" />
</svg>
