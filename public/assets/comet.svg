<svg xmlns="http://www.w3.org/2000/svg" width="56" height="40" viewBox="0 0 56 40" role="img">
  <title>AstroType — Decorative Comet</title>
  <desc>Small comet with bright head and diagonal tail. Parallax background decoration.</desc>

  <!-- Tail (diagonal, fading) -->
  <ellipse cx="28" cy="18" rx="18" ry="4" fill="#FFD740" opacity="0.2" transform="rotate(-30, 28, 18)" />
  <ellipse cx="24" cy="16" rx="12" ry="3" fill="#FFE57F" opacity="0.3" transform="rotate(-30, 24, 16)" />

  <!-- Comet head -->
  <circle cx="16" cy="12" r="6" fill="#FFFFFF" />

  <!-- Inner glow -->
  <circle cx="15" cy="11" r="3" fill="#FFD740" opacity="0.6" />
  <circle cx="15" cy="11" r="1.5" fill="#FFFFFF" />
</svg>
