<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img">
  <title>Gear Collectible</title>
  <desc>Golden collectible gear for TypeBot game</desc>

  <defs>
    <radialGradient id="gear-gradient" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE57F" />
      <stop offset="70%" stop-color="#FFD740" />
      <stop offset="100%" stop-color="#FFC400" />
    </radialGradient>
  </defs>

  <!-- Rotating gear group -->
  <g class="gear">
    <!-- Outer gear body with gradient -->
    <circle cx="16" cy="16" r="14" fill="url(#gear-gradient)" />

    <!-- 6 teeth, rotated every 60° around center -->
    <g transform="rotate(0, 16, 16)">
      <rect x="13" y="0.5" width="6" height="5" rx="1" fill="url(#gear-gradient)" />
    </g>
    <g transform="rotate(60, 16, 16)">
      <rect x="13" y="0.5" width="6" height="5" rx="1" fill="url(#gear-gradient)" />
    </g>
    <g transform="rotate(120, 16, 16)">
      <rect x="13" y="0.5" width="6" height="5" rx="1" fill="url(#gear-gradient)" />
    </g>
    <g transform="rotate(180, 16, 16)">
      <rect x="13" y="0.5" width="6" height="5" rx="1" fill="url(#gear-gradient)" />
    </g>
    <g transform="rotate(240, 16, 16)">
      <rect x="13" y="0.5" width="6" height="5" rx="1" fill="url(#gear-gradient)" />
    </g>
    <g transform="rotate(300, 16, 16)">
      <rect x="13" y="0.5" width="6" height="5" rx="1" fill="url(#gear-gradient)" />
    </g>

    <!-- Inner structural ring -->
    <circle cx="16" cy="16" r="9" fill="none" stroke="#FFC400" stroke-width="2" />

    <!-- Specular highlight (rotates with gear) -->
    <circle cx="10" cy="9" r="3" fill="white" opacity="0.5" />
  </g>

  <!-- Center hole (static — transparent to game background) -->
  <circle cx="16" cy="16" r="5" fill="#1a1a2e" />

  <style>
    .gear {
      transform-origin: 16px 16px;
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .gear { animation: none !important; }
    }
  </style>
</svg>
