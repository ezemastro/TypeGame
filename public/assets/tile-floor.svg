<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <title>TypeBot — Floor Tile</title>
  <desc>Clean dark ground with subtle terrain contour lines. No dots, no noise.</desc>

  <!-- Base ground -->
  <rect width="128" height="128" fill="#3A4D1E" />

  <!-- Subtle terrain contour bands — very low opacity, seamless tiling -->
  <rect y="0"   width="128" height="2" fill="#2D3E15" opacity="0.15" />
  <rect y="24"  width="128" height="1.5" fill="#4A5D2E" opacity="0.12" />
  <rect y="48"  width="128" height="2.5" fill="#2D3E15" opacity="0.14" />
  <rect y="72"  width="128" height="1.5" fill="#4A5D2E" opacity="0.12" />
  <rect y="96"  width="128" height="2" fill="#2D3E15" opacity="0.15" />
  <!-- Vertical tiling pair for the top band -->
  <rect y="120" width="128" height="2" fill="#2D3E15" opacity="0.15" />
</svg>
