<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- ===== Full Green Grass Background ===== -->
  <rect width="128" height="128" fill="#7CB342"/>

  <!-- ===== Grass Texture: scattered darker green dots ===== -->
  <!-- Distributed across the entire tile for natural look -->

  <!-- Interior dots (no edge constraints) -->
  <circle cx="20" cy="30" r="3" fill="#558B2F"/>
  <circle cx="45" cy="15" r="2.5" fill="#689F38"/>
  <circle cx="65" cy="45" r="2" fill="#558B2F"/>
  <circle cx="85" cy="25" r="3.5" fill="#558B2F"/>
  <circle cx="105" cy="35" r="2" fill="#689F38"/>
  <circle cx="115" cy="55" r="2.5" fill="#558B2F"/>
  <circle cx="15" cy="60" r="2" fill="#689F38"/>
  <circle cx="40" cy="80" r="3" fill="#558B2F"/>
  <circle cx="55" cy="70" r="2" fill="#689F38"/>
  <circle cx="75" cy="90" r="2.5" fill="#558B2F"/>
  <circle cx="95" cy="80" r="2" fill="#689F38"/>
  <circle cx="110" cy="100" r="3" fill="#558B2F"/>
  <circle cx="30" cy="105" r="2" fill="#689F38"/>
  <circle cx="50" cy="115" r="2.5" fill="#558B2F"/>
  <circle cx="70" cy="105" r="2" fill="#689F38"/>
  <circle cx="90" cy="115" r="2" fill="#558B2F"/>
  <circle cx="10" cy="90" r="2.5" fill="#689F38"/>
  <circle cx="60" cy="35" r="1.5" fill="#689F38"/>
  <circle cx="100" cy="65" r="1.5" fill="#558B2F"/>
  <circle cx="35" cy="50" r="1.5" fill="#558B2F"/>
  <circle cx="80" cy="55" r="2" fill="#558B2F"/>
  <circle cx="25" cy="75" r="1.5" fill="#689F38"/>
  <circle cx="120" cy="15" r="1.5" fill="#689F38"/>

  <!-- Small grass blade clusters -->
  <rect x="22" y="22" width="1.5" height="4" fill="#558B2F" rx="0.5"/>
  <rect x="68" y="38" width="1.5" height="3.5" fill="#558B2F" rx="0.5"/>
  <rect x="102" y="48" width="1.5" height="4" fill="#689F38" rx="0.5"/>
  <rect x="42" y="92" width="1.5" height="3" fill="#558B2F" rx="0.5"/>
  <rect x="88" y="108" width="1.5" height="3.5" fill="#689F38" rx="0.5"/>
  <rect x="12" y="42" width="1.5" height="3" fill="#558B2F" rx="0.5"/>
  <rect x="56" y="88" width="1.5" height="4" fill="#689F38" rx="0.5"/>

  <!-- ===== Small flower dots (white + yellow, 1-2 per tile max) ===== -->
  <circle cx="48" cy="55" r="2.5" fill="#FFFFFF"/>
  <circle cx="95" cy="95" r="2" fill="#FFD740"/>

  <!-- ===== Edge-continuity pairs for seamless tiling ===== -->

  <!-- Left/Right edge pairs -->
  <circle cx="3" cy="18" r="2" fill="#558B2F"/>
  <circle cx="125" cy="18" r="2" fill="#558B2F"/>
  <circle cx="2" cy="45" r="2.5" fill="#689F38"/>
  <circle cx="126" cy="45" r="2.5" fill="#689F38"/>
  <circle cx="4" cy="70" r="1.5" fill="#558B2F"/>
  <circle cx="124" cy="70" r="1.5" fill="#558B2F"/>
  <circle cx="2" cy="98" r="2" fill="#689F38"/>
  <circle cx="126" cy="98" r="2" fill="#689F38"/>
  <circle cx="3" cy="118" r="1.5" fill="#558B2F"/>
  <circle cx="125" cy="118" r="1.5" fill="#558B2F"/>

  <!-- Top/Bottom edge pairs -->
  <circle cx="28" cy="2" r="2" fill="#689F38"/>
  <circle cx="28" cy="126" r="2" fill="#689F38"/>
  <circle cx="58" cy="3" r="2.5" fill="#558B2F"/>
  <circle cx="58" cy="125" r="2.5" fill="#558B2F"/>
  <circle cx="82" cy="2" r="1.5" fill="#689F38"/>
  <circle cx="82" cy="126" r="1.5" fill="#689F38"/>
  <circle cx="110" cy="3" r="2" fill="#558B2F"/>
  <circle cx="110" cy="125" r="2" fill="#558B2F"/>

  <!-- Corner pairs (diagonal wrap) -->
  <circle cx="2" cy="2" r="2" fill="#558B2F"/>
  <circle cx="126" cy="126" r="2" fill="#558B2F"/>
</svg>
