<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img">
  <title>AstroType — Starfield Tile</title>
  <desc>Seamless deep space background with scattered stars. Used as tileSprite in Phaser for infinite scrolling starfield.</desc>

  <!-- Deep space background -->
  <rect width="128" height="128" fill="#0B0E2A" />

  <!-- Subtle nebula bands for depth -->
  <ellipse cx="64" cy="45" rx="55" ry="14" fill="#E040FB" opacity="0.06" />
  <ellipse cx="30" cy="90" rx="40" ry="10" fill="#448AFF" opacity="0.04" />

  <!-- Bright white stars (12×) — scattered naturally, r=1-3, no clustering at edges -->
  <circle cx="12" cy="18" r="1.5" fill="#FFFFFF" opacity="0.7" />
  <circle cx="38" cy="6" r="2" fill="#FFFFFF" opacity="0.9" />
  <circle cx="65" cy="22" r="1" fill="#FFFFFF" opacity="0.5" />
  <circle cx="90" cy="10" r="2.5" fill="#FFFFFF" opacity="0.8" />
  <circle cx="118" cy="32" r="1.5" fill="#FFFFFF" opacity="0.6" />
  <circle cx="20" cy="48" r="2" fill="#FFFFFF" opacity="0.8" />
  <circle cx="52" cy="58" r="1" fill="#FFFFFF" opacity="0.4" />
  <circle cx="80" cy="42" r="3" fill="#FFFFFF" opacity="0.9" />
  <circle cx="108" cy="62" r="1.5" fill="#FFFFFF" opacity="0.7" />
  <circle cx="8" cy="82" r="2" fill="#FFFFFF" opacity="0.5" />
  <circle cx="96" cy="88" r="1" fill="#FFFFFF" opacity="0.6" />
  <circle cx="124" cy="104" r="2" fill="#FFFFFF" opacity="0.8" />

  <!-- Blue-white stars (5×) — adds color variety -->
  <circle cx="45" cy="32" r="2" fill="#90CAF9" opacity="0.5" />
  <circle cx="74" cy="72" r="1.5" fill="#90CAF9" opacity="0.4" />
  <circle cx="16" cy="68" r="2.5" fill="#90CAF9" opacity="0.6" />
  <circle cx="58" cy="105" r="1.5" fill="#90CAF9" opacity="0.3" />
  <circle cx="112" cy="42" r="2" fill="#90CAF9" opacity="0.5" />

  <!-- Dim stars (3×) — background depth -->
  <circle cx="34" cy="96" r="1.5" fill="#B0BEC5" opacity="0.3" />
  <circle cx="86" cy="118" r="2" fill="#B0BEC5" opacity="0.4" />
  <circle cx="68" cy="14" r="1" fill="#B0BEC5" opacity="0.2" />
</svg>
