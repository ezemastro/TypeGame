<svg xmlns="http://www.w3.org/2000/svg" width="80" height="40" viewBox="0 0 80 40" role="img">
  <title>AstroType — Ship Cannon HUD</title>
  <desc>Spaceship energy cannon displayed in HUD top-right. Cyan muzzle glow with metallic barrel. Static for Phaser.CANVAS.</desc>

  <!-- Grip / handle (rear vertical piece) -->
  <rect x="4" y="12" width="10" height="16" rx="2" fill="#607D8B" />

  <!-- Main barrel body -->
  <rect x="14" y="13" width="56" height="14" rx="4" fill="#78909C" />

  <!-- Barrel detail lines -->
  <rect x="28" y="16" width="1.5" height="8" rx="0.75" fill="#90A4AE" opacity="0.5" />
  <rect x="44" y="16" width="1.5" height="8" rx="0.75" fill="#90A4AE" opacity="0.5" />

  <!-- Muzzle glow (soft outer ring) -->
  <circle cx="70" cy="20" r="8" fill="#00E5FF" opacity="0.2" />

  <!-- Muzzle nozzle ring -->
  <circle cx="70" cy="20" r="4.5" fill="none" stroke="#00E5FF" stroke-width="1.5" />

  <!-- Muzzle core -->
  <circle cx="70" cy="20" r="2" fill="#FFFFFF" />

  <!-- Indicator light (top, near muzzle) -->
  <circle cx="56" cy="8" r="2" fill="#00E5FF" />
  <circle cx="56" cy="8" r="4" fill="#00E5FF" opacity="0.15" />
</svg>
