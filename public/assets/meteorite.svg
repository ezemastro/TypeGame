<svg xmlns="http://www.w3.org/2000/svg" width="64" height="48" viewBox="0 0 64 48" role="img">
  <title>AstroType — Space Debris</title>
  <desc>Angular space debris built from overlapping rounded rectangles. Parallax background.</desc>

  <!-- Ground shadow -->
  <ellipse cx="32" cy="44" rx="20" ry="3.5" fill="#000000" opacity="0.15" />

  <!-- Right fragment (top-right, lighter) -->
  <rect x="38" y="4" width="18" height="28" rx="3" fill="#546E7A" />

  <!-- Left fragment (mid-left, darker) -->
  <rect x="2" y="16" width="12" height="24" rx="2" fill="#455A64" />

  <!-- Main body (center) -->
  <rect x="8" y="8" width="28" height="34" rx="3" fill="#546E7A" />

  <!-- Highlight (light source top-left) -->
  <rect x="40" y="4" width="10" height="8" rx="2" fill="#78909C" opacity="0.4" />

  <!-- Edge accent (depth on right edge of main body) -->
  <rect x="33" y="12" width="3" height="26" rx="1" fill="#455A64" opacity="0.5" />
</svg>
