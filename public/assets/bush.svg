<svg xmlns="http://www.w3.org/2000/svg" width="72" height="56" viewBox="0 0 72 56" role="img">
  <title>AstroType — Asteroid Cluster</title>
  <desc>Three rocky asteroids in a cluster. Geometric circles with craters and highlights. Parallax background.</desc>

  <!-- Ground shadow -->
  <ellipse cx="36" cy="52" rx="24" ry="4" fill="#000000" opacity="0.15" />

  <!-- Main asteroid (left, largest) -->
  <circle cx="22" cy="34" r="16" fill="#757575" />

  <!-- Secondary asteroid (center, medium-light) -->
  <circle cx="42" cy="30" r="14" fill="#9E9E9E" />

  <!-- Tertiary asteroid (right, medium-dark) -->
  <circle cx="50" cy="38" r="12" fill="#757575" />

  <!-- Craters on main asteroid -->
  <circle cx="26" cy="30" r="3.5" fill="#616161" opacity="0.45" />
  <circle cx="18" cy="40" r="2.5" fill="#616161" opacity="0.4" />
  <circle cx="28" cy="38" r="2" fill="#616161" opacity="0.35" />

  <!-- Craters on center asteroid -->
  <circle cx="44" cy="26" r="3" fill="#616161" opacity="0.4" />
  <circle cx="38" cy="34" r="2" fill="#616161" opacity="0.35" />

  <!-- Crater on right asteroid -->
  <circle cx="52" cy="34" r="3" fill="#616161" opacity="0.4" />

  <!-- Highlights (light source top-left) -->
  <circle cx="18" cy="28" r="5" fill="#9E9E9E" opacity="0.3" />
  <circle cx="38" cy="24" r="4.5" fill="#BDBDBD" opacity="0.3" />
  <circle cx="47" cy="32" r="3.5" fill="#9E9E9E" opacity="0.3" />
</svg>
