<svg width="72" height="56" viewBox="0 0 72 56" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>TypeBot — Bush (Parallax Background)</title>
  <desc>Clean rounded bush with layered green circles and subtle highlights.</desc>

  <!-- Ground shadow -->
  <ellipse cx="36" cy="52" rx="20" ry="4" fill="#1C280A" opacity="0.25" />

  <!-- Bush body — 3 overlapping circles, dark to light -->
  <circle cx="28" cy="36" r="18" fill="#388E3C" />
  <circle cx="44" cy="34" r="16" fill="#43A047" />
  <circle cx="36" cy="28" r="15" fill="#4CAF50" />

  <!-- Highlights -->
  <circle cx="32" cy="24" r="8" fill="#66BB6A" opacity="0.45" />
  <circle cx="42" cy="20" r="6" fill="#81C784" opacity="0.35" />
</svg>
