<svg xmlns="http://www.w3.org/2000/svg" width="80" height="110" viewBox="0 0 80 110" role="img">
  <title>AstroType — Ice Planet</title>
  <desc>Frozen ice planet with polar cap. Cyan-blue body, white highlights. Floating in space.</desc>

  <!-- Planet body -->
  <circle cx="40" cy="45" r="25" fill="#4FC3F7" />

  <!-- Dark crescent (right shadow) -->
  <circle cx="50" cy="42" r="22" fill="#0288D1" opacity="0.35" />

  <!-- Polar ice cap (top) -->
  <ellipse cx="40" cy="28" rx="16" ry="6" fill="#E1F5FE" opacity="0.7" />
  <ellipse cx="40" cy="26" rx="12" ry="4" fill="#FFFFFF" opacity="0.5" />

  <!-- Surface highlight -->
  <circle cx="32" cy="35" r="7" fill="#B3E5FC" opacity="0.4" />
</svg>
