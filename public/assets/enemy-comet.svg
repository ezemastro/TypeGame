<svg xmlns="http://www.w3.org/2000/svg" width="48" height="56" viewBox="0 0 48 56" role="img">
  <title>AstroType — Enemy Comet</title>
  <desc>Fiery comet enemy facing down. Oval body with glowing orange tail. Static for Phaser.CANVAS.</desc>

  <!-- Tail (behind body, elongated) -->
  <ellipse cx="24" cy="38" rx="6" ry="18" fill="#FF7043" opacity="0.35" />
  <ellipse cx="24" cy="42" rx="4" ry="14" fill="#FFAB91" opacity="0.25" />

  <!-- Main body (oval) -->
  <ellipse cx="24" cy="18" rx="14" ry="12" fill="#FF7043" />

  <!-- Body highlights -->
  <ellipse cx="22" cy="16" rx="8" ry="5" fill="#FFAB91" opacity="0.4" />

  <!-- Left eye (menacing, facing down) -->
  <circle cx="18" cy="14" r="4" fill="#FFFFFF" />
  <circle cx="18" cy="15" r="1.5" fill="#BF360C" />

  <!-- Right eye -->
  <circle cx="30" cy="14" r="4" fill="#FFFFFF" />
  <circle cx="30" cy="15" r="1.5" fill="#BF360C" />

  <!-- Core glow -->
  <circle cx="24" cy="22" r="3" fill="#FFFFFF" opacity="0.3" />
</svg>
