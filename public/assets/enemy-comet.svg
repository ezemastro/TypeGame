<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" role="img">
  <title>AstroType — Enemy Comet</title>
  <desc>Orange comet enemy facing down. Circle body with rounded-rect tail. Static for Phaser.CANVAS.</desc>

  <!-- Tail (behind body, rounded rectangles — no ellipses) -->
  <rect x="18" y="30" width="12" height="10" rx="4" fill="#FF7043" opacity="0.45" />
  <rect x="20" y="36" width="8" height="8" rx="3" fill="#FFAB91" opacity="0.3" />

  <!-- Main body (circle) -->
  <circle cx="24" cy="18" r="13" fill="#FF7043" />

  <!-- Body highlight -->
  <circle cx="21" cy="15" r="7" fill="#FFAB91" opacity="0.4" />

  <!-- Left eye (facing down) -->
  <circle cx="18" cy="16" r="4" fill="#FFFFFF" />
  <circle cx="18" cy="17" r="1.5" fill="#BF360C" />

  <!-- Right eye -->
  <circle cx="30" cy="16" r="4" fill="#FFFFFF" />
  <circle cx="30" cy="17" r="1.5" fill="#BF360C" />

  <!-- Core glow -->
  <circle cx="24" cy="22" r="2.5" fill="#FFFFFF" opacity="0.25" />
</svg>
