<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img">
  <title>AstroType Favicon</title>
  <desc>Tiny cyan spaceship icon for browser tab. Simplified geometric silhouette.</desc>

  <!-- Hull -->
  <rect x="6" y="4" width="20" height="18" rx="4" fill="#00E5FF" />

  <!-- Cockpit -->
  <circle cx="16" cy="8" r="4" fill="#FFFFFF" />

  <!-- Left wing -->
  <rect x="2" y="16" width="8" height="10" rx="2" fill="#00B8D4" />

  <!-- Right wing -->
  <rect x="22" y="16" width="8" height="10" rx="2" fill="#00B8D4" />

  <!-- Engine -->
  <circle cx="16" cy="24" r="3" fill="#FFFFFF" opacity="0.6" />
</svg>
